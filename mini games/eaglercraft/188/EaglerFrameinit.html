<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 1.8.8 Fullscreen</title>
    <style>
        /* Reset page margins and paddings */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Create a container that fills the entire viewport */
        .iframe-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Style the iframe to fill the container and stretch responsively */
        .responsive-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe name="Minecraft 1.8.8" class="responsive-iframe" src="https://nooknationplays.github.io/mini%20games/eaglercraft/188/index.html" scrolling="no" allowfullscreen></iframe>
    </div>

</body>
</html>
